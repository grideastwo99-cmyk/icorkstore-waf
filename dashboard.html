<!DOCTYPE html>
<html>
<head>
    <title>🛡️ icorkstore.kesug.com WAF Dashboard</title>
    <meta http-equiv="refresh" content="30">
    <style>
        body{font-family:monospace;background:#111;color:#0f0;padding:20px}
        h1{color:#f44;text-align:center}
        .attack{background:#300;color:#f00;padding:10px;margin:5px 0}
        pre{white-space:pre-wrap}
    </style>
</head>
<body>
    <h1>🔒 icorkstore WAF Status</h1>
    <h2>📊 Recent Blocks:</h2>
    <pre class="attack">
$(curl -s localhost/waf/logs/blocked.log | tail -20 || echo "No attacks yet")
    </pre>
    <h2>📈 Rate Limits:</h2>
    <pre>
$(curl -s localhost/waf/logs/rate.log | tail -10 || echo "No rate limits")
    </pre>
</body>
</html>

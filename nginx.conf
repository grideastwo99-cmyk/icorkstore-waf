events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    
    server {
        listen 80;
        server_name waf.icorkstore.kesug.com icorkstore.kesug.com;
        
        # WAF RULES - BLOCK ATTACKS
        if ($args ~* "(union|select|insert|update|delete|drop|--|;|\/\*|\*\/)") { 
            access_log /var/log/nginx/blocked.log;
            return 403 '{"error":"SQL Injection Blocked"}';
        }
        
        if ($args ~* "(<script|javascript:|onload|onerror|alert|eval\$)" ) { 
            access_log /var/log/nginx/blocked.log;
            return 403 '{"error":"XSS Blocked"}'; 
        }
        
        if ($request_uri ~* "\.\.\/|\/proc\/|\/etc\/passwd|phpinfo" ) { 
            access_log /var/log/nginx/blocked.log;
            return 403 '{"error":"File Access Blocked"}'; 
        }
        
        if ($http_user_agent ~* "sqlmap|nikto|acunetix|nessus" ) {
            access_log /var/log/nginx/blocked.log;
            return 403 '{"error":"Scanner Blocked"}';
        }
        
        # Rate limit sensitive paths
        location ~* ^/(login|admin|wp-login|wp-admin) {
            limit_req zone=login burst=10 nodelay;
            access_log /var/log/nginx/rate.log;
        }
        
        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy "strict-origin-when-cross-origin";
        
        # WAF Dashboard
        location /waf {
            root /var/www;
            index dashboard.html;
        }
        
        location /waf/logs {
            alias /var/log/nginx/;
            autoindex on;
        }
        
        # Proxy to your real site
        location / {
            proxy_pass http://icorkstore.kesug.com;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
